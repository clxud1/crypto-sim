<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Crypto Exchange
</title>


<link rel="stylesheet" href="style.css">


<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>


</head>



<body>


<header>


<div class="logo">

₿ Crypto Exchange

</div>



<div class="status">

● BINANCE LIVE

</div>


</header>








<div class="layout">



<main>





<div class="topbar">



<div class="coinCard">


<div id="coinName">

BTCUSDT

</div>



<div id="coinPrice">

-

</div>



<div id="coinChange">

-

</div>



</div>







<div class="assetCard">



<div class="assetBox">


<span>

예수금

</span>



<b>

<span id="cash">

10,000.00

</span>

USDT

</b>



</div>









<div class="assetBox">


<span>

평가금액

</span>



<b>

<span id="asset">

10,000.00

</span>

USDT


<span id="assetPercent">

(+0.00%)

</span>


</b>


</div>





</div>





</div>









<select id="coinSelect">


<option value="BTCUSDT">

BTC

</option>


<option value="ETHUSDT">

ETH

</option>


<option value="BNBUSDT">

BNB

</option>


<option value="SOLUSDT">

SOL

</option>


<option value="XRPUSDT">

XRP

</option>



</select>








<div id="chart"></div>





</main>









<aside>




<div class="card order">



<h2>

ORDER

</h2>







<div class="tradeButtons">



<button

id="longBtn"

onclick="openOrder('LONG')">


LONG


</button>





<button

id="shortBtn"

onclick="openOrder('SHORT')">


SHORT


</button>



</div>









<label>


Leverage


<span id="levText">

1x

</span>


</label>







<input

id="leverage"

type="range"

min="1"

max="500"

value="1">







<div class="levButtons">



<button onclick="setLeverage(10)">

10x

</button>




<button onclick="setLeverage(50)">

50x

</button>




<button onclick="setLeverage(100)">

100x

</button>




<button onclick="setLeverage(500)">

500x

</button>




</div>









<label>

Quantity

</label>




<input

id="amount"

type="number"

value="1"

min="1">










<div class="percent">



<button onclick="setPercent(25)">

25%

</button>



<button onclick="setPercent(50)">

50%

</button>



<button onclick="setPercent(75)">

75%

</button>



<button onclick="setPercent(100)">

100%

</button>



</div>







</div>









<div class="card positions">



<h2>

POSITIONS

</h2>




<div id="positions"></div>




</div>






</aside>





</div>







<script src="app.js"></script>



</body>


</html>
